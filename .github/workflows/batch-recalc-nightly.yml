name: batch-recalc-nightly

on:
  schedule:
    - cron: "13 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  CI_ARTIFACT_RETENTION_DAYS: "21"
  CI_ARTIFACT_ROOT: ./ci-artifacts
  BATCH_MIN_PROCESSED_FILES: "24"
  BATCH_MIN_THROUGHPUT_FILES_PER_SEC: "5.0"
  BATCH_BENCH_RECALC_SYNTHETIC_ENABLED: "true"
  BATCH_BENCH_CHAINS: "16"
  BATCH_BENCH_CHAIN_LENGTH: "256"
  BATCH_BENCH_ITERATIONS: "5"
  BATCH_BENCH_CHANGED_CHAIN: "1"
  BATCH_BENCH_MIN_DURATION_SPEEDUP_RATIO: "1.0"
  BATCH_BENCH_MAX_EVALUATED_CELLS_RATIO: "0.50"
  ROOTCELLAR_INCIDENT_WEBHOOK_URL: ${{ secrets.ROOTCELLAR_INCIDENT_WEBHOOK_URL }}
  ROOTCELLAR_DASHBOARD_INGEST_URL: ${{ secrets.ROOTCELLAR_DASHBOARD_INGEST_URL }}
  ROOTCELLAR_INCIDENT_WEBHOOK_TOKEN: ${{ secrets.ROOTCELLAR_INCIDENT_WEBHOOK_TOKEN }}
  ROOTCELLAR_DASHBOARD_INGEST_TOKEN: ${{ secrets.ROOTCELLAR_DASHBOARD_INGEST_TOKEN }}
  ROOTCELLAR_ALERT_SIGNING_SECRET: ${{ secrets.ROOTCELLAR_ALERT_SIGNING_SECRET }}
  ALERT_DISPATCH_MAX_ATTEMPTS: "3"
  ALERT_DISPATCH_INITIAL_BACKOFF_SEC: "0.5"
  ALERT_DISPATCH_BACKOFF_MULTIPLIER: "2.0"
  ALERT_DISPATCH_MAX_BACKOFF_SEC: "5.0"
  ALERT_DISPATCH_REPLAY_WINDOW_SEC: "300"
  ALERT_DISPATCH_REPLAY_TIMESTAMP_HEADER: "X-RootCellar-Timestamp"
  ALERT_DISPATCH_REPLAY_NONCE_HEADER: "X-RootCellar-Nonce"
  ALERT_DISPATCH_REPLAY_WINDOW_HEADER: "X-RootCellar-Replay-Window-Sec"
  ALERT_DISPATCH_REQUIRE_ACK_ON_INCIDENT: "false"
  ALERT_DISPATCH_REQUIRE_ACK_ON_DASHBOARD: "false"
  ALERT_DISPATCH_REQUIRE_CORRELATION_ON_INCIDENT: "false"
  ALERT_DISPATCH_REQUIRE_CORRELATION_ON_DASHBOARD: "false"
  ALERT_ACK_RETENTION_DAYS: "30"
  ALERT_POLICY_MAX_DISPATCH_FAILED_ROUTES: "0"
  ALERT_POLICY_MAX_ACK_MISSING_ROUTES: "0"
  ALERT_POLICY_MAX_CORRELATION_MISMATCH_ROUTES: "0"
  ALERT_POLICY_REQUIRE_REPLAY_METADATA: "true"
  ALERT_POLICY_REQUIRE_ACK_RETENTION_COVERAGE: "true"
  ALERT_POLICY_FAIL_ON_BREACH: "true"
  ALERT_POLICY_OWNER_TEAM_DEFAULT: "rootcellar-core"
  ALERT_POLICY_OWNER_TEAM_SNAPSHOT: "rootcellar-performance"
  ALERT_POLICY_OWNER_TEAM_DISPATCH: "rootcellar-reliability"
  ALERT_POLICY_OWNER_TEAM_ACK_RETENTION: "rootcellar-observability"
  ALERT_POLICY_OWNER_TEAM_POLICY: "rootcellar-observability"
  ALERT_POLICY_OWNER_CONTACT_CHANNEL: "#rootcellar-oncall"
  ALERT_POLICY_ESCALATION_TARGET_P1: "pagerduty://rootcellar-critical"
  ALERT_POLICY_ESCALATION_TARGET_P2: "pagerduty://rootcellar-high"
  ALERT_POLICY_ESCALATION_TARGET_P3: "slack://rootcellar-alerts"
  ALERT_POLICY_ESCALATION_TARGET_INFO: "slack://rootcellar-observability"
  ALERT_POLICY_ESCALATION_SLA_MINUTES_P1: "15"
  ALERT_POLICY_ESCALATION_SLA_MINUTES_P2: "60"
  ALERT_POLICY_ESCALATION_SLA_MINUTES_P3: "240"
  ALERT_POLICY_ESCALATION_SLA_MINUTES_INFO: "1440"
  ALERT_POLICY_SCHEMA_VALIDATION_ENABLED: "true"
  ALERT_POLICY_SCHEMA_CANARY_VALIDATION_ENABLED: "true"
  ALERT_POLICY_SCHEMA_MIGRATION_DRILL_VALIDATION_ENABLED: "true"
  ALERT_POLICY_SCHEMA_MIGRATION_DRY_RUN_POLICY_VALIDATION_ENABLED: "true"
  ALERT_POLICY_SCHEMA_MIGRATION_DRILL_ARTIFACTS: "snapshot,dispatch,ack_retention,dashboard_pack,policy,escalation,adapter_exports"
  ALERT_POLICY_SCHEMA_MIGRATION_DRILL_WAVE_SPEC: ""
  ALERT_POLICY_SCHEMA_MIGRATION_DRILL_FAULT_INJECTION_ENABLED: "true"
  ALERT_POLICY_SCHEMA_MIGRATION_DRILL_FAULT_SCENARIOS: "malformed_fallback_schema,partial_wave_rollback"
  ALERT_POLICY_SCHEMA_SNAPSHOT_PATH: "./schemas/artifacts/v1/batch-throughput-snapshot.schema.json"
  ALERT_POLICY_SCHEMA_DISPATCH_PATH: "./schemas/artifacts/v1/batch-alert-dispatch.schema.json"
  ALERT_POLICY_SCHEMA_ACK_RETENTION_PATH: "./schemas/artifacts/v1/batch-ack-retention-index.schema.json"
  ALERT_POLICY_SCHEMA_DASHBOARD_PACK_PATH: "./schemas/artifacts/v1/batch-dashboard-pack.schema.json"
  ALERT_POLICY_SCHEMA_POLICY_PATH: "./schemas/artifacts/v1/batch-alert-policy.schema.json"
  ALERT_POLICY_SCHEMA_ESCALATION_PATH: "./schemas/artifacts/v1/batch-policy-escalation.schema.json"
  ALERT_POLICY_SCHEMA_ADAPTER_EXPORTS_PATH: "./schemas/artifacts/v1/batch-dashboard-adapter-exports.schema.json"

concurrency:
  group: batch-recalc-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  batch-recalc:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install fixture Python dependencies
        run: |
          python -m pip install --disable-pip-version-check -r ./python/requirements-interop.txt

      - name: Build nightly batch corpus slice
        run: |
          python python/build_batch_nightly_corpus.py --output-dir ./.ci/batch-nightly-corpus --target-files 32

      - name: Run tests
        run: |
          cargo test --workspace --locked

      - name: Run batch recalc corpus
        id: batch_recalc_run
        continue-on-error: true
        run: |
          cargo run -p rootcellar-cli --locked -- batch recalc ./.ci/batch-nightly-corpus/files --threads 4 --detail-level diagnostic --fail-on-errors --report ./ci-batch-recalc-report.json --jsonl ./ci-batch-recalc-events.jsonl

      - name: Run synthetic recalc benchmark
        if: always()
        continue-on-error: true
        run: |
          if [ "${BATCH_BENCH_RECALC_SYNTHETIC_ENABLED}" != "true" ]; then
            echo "synthetic recalc benchmark disabled by policy knob"
            exit 0
          fi
          cargo run -p rootcellar-cli --locked -- bench recalc-synthetic --chains "${BATCH_BENCH_CHAINS}" --chain-length "${BATCH_BENCH_CHAIN_LENGTH}" --iterations "${BATCH_BENCH_ITERATIONS}" --changed-chain "${BATCH_BENCH_CHANGED_CHAIN}" --report ./ci-batch-bench-recalc-synthetic.json --jsonl ./ci-batch-bench-events.jsonl

      - name: Build throughput trend snapshot and alert payload
        if: always()
        run: |
          python python/build_batch_trend_snapshot.py \
            --report ./ci-batch-recalc-report.json \
            --snapshot ./ci-batch-throughput-snapshot.json \
            --alert ./ci-batch-alert-hook.json \
            --min-processed-files "${BATCH_MIN_PROCESSED_FILES}" \
            --min-throughput-files-per-sec "${BATCH_MIN_THROUGHPUT_FILES_PER_SEC}" \
            --allow-missing-report

      - name: Dispatch alert payload to incident/dashboard routes
        if: always()
        run: |
          args=(
            python
            python/dispatch_batch_alert_hook.py
            --alert
            ./ci-batch-alert-hook.json
            --snapshot
            ./ci-batch-throughput-snapshot.json
            --dispatch-report
            ./ci-batch-alert-dispatch.json
            --max-attempts
            "${ALERT_DISPATCH_MAX_ATTEMPTS}"
            --initial-backoff-sec
            "${ALERT_DISPATCH_INITIAL_BACKOFF_SEC}"
            --backoff-multiplier
            "${ALERT_DISPATCH_BACKOFF_MULTIPLIER}"
            --max-backoff-sec
            "${ALERT_DISPATCH_MAX_BACKOFF_SEC}"
            --idempotency-key-prefix
            rootcellar-batch-alert
            --idempotency-header
            Idempotency-Key
            --correlation-header
            X-Correlation-Id
            --correlation-field
            correlation_id
            --replay-window-sec
            "${ALERT_DISPATCH_REPLAY_WINDOW_SEC}"
            --replay-timestamp-header
            "${ALERT_DISPATCH_REPLAY_TIMESTAMP_HEADER}"
            --replay-nonce-header
            "${ALERT_DISPATCH_REPLAY_NONCE_HEADER}"
            --replay-window-header
            "${ALERT_DISPATCH_REPLAY_WINDOW_HEADER}"
            --fail-on-route-error
          )
          if [ "${ALERT_DISPATCH_REQUIRE_ACK_ON_INCIDENT}" = "true" ]; then
            args+=(--require-ack-on-incident)
          fi
          if [ "${ALERT_DISPATCH_REQUIRE_ACK_ON_DASHBOARD}" = "true" ]; then
            args+=(--require-ack-on-dashboard)
          fi
          if [ "${ALERT_DISPATCH_REQUIRE_CORRELATION_ON_INCIDENT}" = "true" ]; then
            args+=(--require-correlation-on-incident)
          fi
          if [ "${ALERT_DISPATCH_REQUIRE_CORRELATION_ON_DASHBOARD}" = "true" ]; then
            args+=(--require-correlation-on-dashboard)
          fi
          "${args[@]}"

      - name: Build acknowledgement retention index
        if: always()
        run: |
          python python/build_batch_ack_retention_index.py \
            --dispatch-report ./ci-batch-alert-dispatch.json \
            --index ./ci-batch-ack-retention-index.json \
            --retention-days "${ALERT_ACK_RETENTION_DAYS}" \
            --allow-missing-dispatch-report

      - name: Build dashboard pack and alert policy artifacts
        if: always()
        run: |
          args=(
            python
            python/build_batch_dashboard_pack.py
            --snapshot
            ./ci-batch-throughput-snapshot.json
            --dispatch-report
            ./ci-batch-alert-dispatch.json
            --ack-retention-index
            ./ci-batch-ack-retention-index.json
            --dashboard-pack
            ./ci-batch-dashboard-pack.json
            --policy
            ./ci-batch-alert-policy.json
            --max-dispatch-failed-routes
            "${ALERT_POLICY_MAX_DISPATCH_FAILED_ROUTES}"
            --max-ack-missing-routes
            "${ALERT_POLICY_MAX_ACK_MISSING_ROUTES}"
            --max-correlation-mismatch-routes
            "${ALERT_POLICY_MAX_CORRELATION_MISMATCH_ROUTES}"
            --allow-missing-inputs
          )
          if [ "${ALERT_POLICY_REQUIRE_REPLAY_METADATA}" = "true" ]; then
            args+=(--require-replay-metadata)
          fi
          if [ "${ALERT_POLICY_REQUIRE_ACK_RETENTION_COVERAGE}" = "true" ]; then
            args+=(--require-ack-retention-coverage)
          fi
          if [ "${ALERT_POLICY_FAIL_ON_BREACH}" = "true" ]; then
            args+=(--fail-on-policy-breach)
          fi
          "${args[@]}"

      - name: Build policy escalation metadata and adapter exports
        if: always()
        run: |
          python python/build_batch_policy_adapters.py \
            --policy ./ci-batch-alert-policy.json \
            --dashboard-pack ./ci-batch-dashboard-pack.json \
            --escalation ./ci-batch-policy-escalation.json \
            --adapter-exports ./ci-batch-dashboard-adapter-exports.json \
            --owner-team-default "${ALERT_POLICY_OWNER_TEAM_DEFAULT}" \
            --owner-team-snapshot "${ALERT_POLICY_OWNER_TEAM_SNAPSHOT}" \
            --owner-team-dispatch "${ALERT_POLICY_OWNER_TEAM_DISPATCH}" \
            --owner-team-ack-retention "${ALERT_POLICY_OWNER_TEAM_ACK_RETENTION}" \
            --owner-team-policy "${ALERT_POLICY_OWNER_TEAM_POLICY}" \
            --owner-contact-channel "${ALERT_POLICY_OWNER_CONTACT_CHANNEL}" \
            --escalation-target-p1 "${ALERT_POLICY_ESCALATION_TARGET_P1}" \
            --escalation-target-p2 "${ALERT_POLICY_ESCALATION_TARGET_P2}" \
            --escalation-target-p3 "${ALERT_POLICY_ESCALATION_TARGET_P3}" \
            --escalation-target-info "${ALERT_POLICY_ESCALATION_TARGET_INFO}" \
            --escalation-sla-minutes-p1 "${ALERT_POLICY_ESCALATION_SLA_MINUTES_P1}" \
            --escalation-sla-minutes-p2 "${ALERT_POLICY_ESCALATION_SLA_MINUTES_P2}" \
            --escalation-sla-minutes-p3 "${ALERT_POLICY_ESCALATION_SLA_MINUTES_P3}" \
            --escalation-sla-minutes-info "${ALERT_POLICY_ESCALATION_SLA_MINUTES_INFO}" \
            --allow-missing-inputs

      - name: Validate batch artifact schemas and version contracts
        if: always()
        run: |
          if [ "${ALERT_POLICY_SCHEMA_VALIDATION_ENABLED}" != "true" ]; then
            echo "batch artifact schema validation disabled by policy knob"
            exit 0
          fi
          python python/validate_batch_adapter_contracts.py \
            --full-family \
            --snapshot ./ci-batch-throughput-snapshot.json \
            --dispatch ./ci-batch-alert-dispatch.json \
            --ack-retention ./ci-batch-ack-retention-index.json \
            --dashboard-pack ./ci-batch-dashboard-pack.json \
            --policy ./ci-batch-alert-policy.json \
            --escalation ./ci-batch-policy-escalation.json \
            --adapter-exports ./ci-batch-dashboard-adapter-exports.json \
            --schema-snapshot "${ALERT_POLICY_SCHEMA_SNAPSHOT_PATH}" \
            --schema-dispatch "${ALERT_POLICY_SCHEMA_DISPATCH_PATH}" \
            --schema-ack-retention "${ALERT_POLICY_SCHEMA_ACK_RETENTION_PATH}" \
            --schema-dashboard-pack "${ALERT_POLICY_SCHEMA_DASHBOARD_PACK_PATH}" \
            --schema-policy "${ALERT_POLICY_SCHEMA_POLICY_PATH}" \
            --schema-escalation "${ALERT_POLICY_SCHEMA_ESCALATION_PATH}" \
            --schema-adapter-exports "${ALERT_POLICY_SCHEMA_ADAPTER_EXPORTS_PATH}"

      - name: Run schema drift canary checks
        if: always()
        run: |
          if [ "${ALERT_POLICY_SCHEMA_VALIDATION_ENABLED}" != "true" ] || [ "${ALERT_POLICY_SCHEMA_CANARY_VALIDATION_ENABLED}" != "true" ]; then
            echo "schema drift canary validation disabled by policy knob"
            exit 0
          fi
          python python/validate_batch_schema_canaries.py \
            --validator-script ./python/validate_batch_adapter_contracts.py \
            --snapshot ./ci-batch-throughput-snapshot.json \
            --dispatch ./ci-batch-alert-dispatch.json \
            --ack-retention ./ci-batch-ack-retention-index.json \
            --dashboard-pack ./ci-batch-dashboard-pack.json \
            --policy ./ci-batch-alert-policy.json \
            --escalation ./ci-batch-policy-escalation.json \
            --adapter-exports ./ci-batch-dashboard-adapter-exports.json \
            --schema-snapshot "${ALERT_POLICY_SCHEMA_SNAPSHOT_PATH}" \
            --schema-dispatch "${ALERT_POLICY_SCHEMA_DISPATCH_PATH}" \
            --schema-ack-retention "${ALERT_POLICY_SCHEMA_ACK_RETENTION_PATH}" \
            --schema-dashboard-pack "${ALERT_POLICY_SCHEMA_DASHBOARD_PACK_PATH}" \
            --schema-policy "${ALERT_POLICY_SCHEMA_POLICY_PATH}" \
            --schema-escalation "${ALERT_POLICY_SCHEMA_ESCALATION_PATH}" \
            --schema-adapter-exports "${ALERT_POLICY_SCHEMA_ADAPTER_EXPORTS_PATH}"

      - name: Run dual-read migration drills
        if: always()
        run: |
          if [ "${ALERT_POLICY_SCHEMA_VALIDATION_ENABLED}" != "true" ] || [ "${ALERT_POLICY_SCHEMA_MIGRATION_DRILL_VALIDATION_ENABLED}" != "true" ]; then
            echo "dual-read migration drill validation disabled by policy knob"
            exit 0
          fi
          args=(
            python
            python/validate_batch_dual_read_migration.py
            --validator-script
            ./python/validate_batch_adapter_contracts.py
            --snapshot
            ./ci-batch-throughput-snapshot.json
            --dispatch
            ./ci-batch-alert-dispatch.json
            --ack-retention
            ./ci-batch-ack-retention-index.json
            --dashboard-pack
            ./ci-batch-dashboard-pack.json
            --policy
            ./ci-batch-alert-policy.json
            --escalation
            ./ci-batch-policy-escalation.json
            --adapter-exports
            ./ci-batch-dashboard-adapter-exports.json
            --schema-snapshot
            "${ALERT_POLICY_SCHEMA_SNAPSHOT_PATH}"
            --schema-dispatch
            "${ALERT_POLICY_SCHEMA_DISPATCH_PATH}"
            --schema-ack-retention
            "${ALERT_POLICY_SCHEMA_ACK_RETENTION_PATH}"
            --schema-dashboard-pack
            "${ALERT_POLICY_SCHEMA_DASHBOARD_PACK_PATH}"
            --schema-policy
            "${ALERT_POLICY_SCHEMA_POLICY_PATH}"
            --schema-escalation
            "${ALERT_POLICY_SCHEMA_ESCALATION_PATH}"
            --schema-adapter-exports
            "${ALERT_POLICY_SCHEMA_ADAPTER_EXPORTS_PATH}"
            --artifacts
            "${ALERT_POLICY_SCHEMA_MIGRATION_DRILL_ARTIFACTS}"
            --wave-spec
            "${ALERT_POLICY_SCHEMA_MIGRATION_DRILL_WAVE_SPEC}"
            --fault-scenarios
            "${ALERT_POLICY_SCHEMA_MIGRATION_DRILL_FAULT_SCENARIOS}"
            --report
            ./ci-batch-schema-migration-drill.json
          )
          if [ "${ALERT_POLICY_SCHEMA_MIGRATION_DRILL_FAULT_INJECTION_ENABLED}" = "true" ]; then
            args+=(--fault-injection)
          fi
          "${args[@]}"

      - name: Run migration-drill policy dry-run checks
        if: always()
        run: |
          if [ "${ALERT_POLICY_SCHEMA_VALIDATION_ENABLED}" != "true" ] || [ "${ALERT_POLICY_SCHEMA_MIGRATION_DRILL_VALIDATION_ENABLED}" != "true" ] || [ "${ALERT_POLICY_SCHEMA_MIGRATION_DRY_RUN_POLICY_VALIDATION_ENABLED}" != "true" ]; then
            echo "migration-drill policy dry-run validation disabled by policy knob"
            exit 0
          fi
          python python/validate_batch_migration_policy_dry_run.py \
            --migration-script ./python/validate_batch_dual_read_migration.py \
            --artifacts "${ALERT_POLICY_SCHEMA_MIGRATION_DRILL_ARTIFACTS}" \
            --fault-scenarios "${ALERT_POLICY_SCHEMA_MIGRATION_DRILL_FAULT_SCENARIOS}"

      - name: Enforce nightly batch gate
        if: always()
        run: |
          python - <<'PY'
          import json
          import os

          with open("./ci-batch-throughput-snapshot.json", "r", encoding="utf-8") as fh:
              snapshot = json.load(fh)
          with open("./ci-batch-alert-policy.json", "r", encoding="utf-8") as fh:
              policy = json.load(fh)
          status = str(snapshot.get("status", "")).lower()
          policy_status = str(policy.get("status", "")).lower()
          if status != "pass":
              raise SystemExit(f"nightly batch gate failed with status={status}")
          if policy_status != "pass":
              severity = policy.get("highest_severity")
              breaches = policy.get("breach_count")
              raise SystemExit(
                  f"nightly batch policy gate failed with status={policy_status}, "
                  f"highest_severity={severity}, breaches={breaches}"
              )

          bench_enabled = os.environ.get("BATCH_BENCH_RECALC_SYNTHETIC_ENABLED", "").lower() == "true"
          if bench_enabled:
              bench_path = "./ci-batch-bench-recalc-synthetic.json"
              try:
                  with open(bench_path, "r", encoding="utf-8") as fh:
                      bench = json.load(fh)
              except FileNotFoundError as exc:
                  raise SystemExit(
                      f"nightly benchmark gate enabled but benchmark report missing: {bench_path}"
                  ) from exc

              summary = bench.get("summary", {})
              speedup = float(summary.get("duration_speedup_ratio", 0.0))
              eval_ratio = float(summary.get("evaluated_cells_reduction_ratio", 1.0))
              min_speedup = float(os.environ["BATCH_BENCH_MIN_DURATION_SPEEDUP_RATIO"])
              max_eval_ratio = float(os.environ["BATCH_BENCH_MAX_EVALUATED_CELLS_RATIO"])
              if speedup < min_speedup:
                  raise SystemExit(
                      "nightly benchmark gate failed: "
                      f"duration_speedup_ratio={speedup:.4f} < min={min_speedup:.4f}"
                  )
              if eval_ratio > max_eval_ratio:
                  raise SystemExit(
                      "nightly benchmark gate failed: "
                      f"evaluated_cells_reduction_ratio={eval_ratio:.4f} > max={max_eval_ratio:.4f}"
                  )

          print("nightly batch gate passed")
          PY

      - name: Assemble batch artifact bundle
        if: always()
        run: |
          set -euo pipefail
          bundle_dir="${CI_ARTIFACT_ROOT}/batch-recalc"
          mkdir -p "${bundle_dir}"
          for file in ci-batch-recalc-report.json ci-batch-recalc-events.jsonl ci-batch-bench-recalc-synthetic.json ci-batch-bench-events.jsonl ci-batch-throughput-snapshot.json ci-batch-alert-hook.json ci-batch-alert-dispatch.json ci-batch-ack-retention-index.json ci-batch-dashboard-pack.json ci-batch-alert-policy.json ci-batch-policy-escalation.json ci-batch-dashboard-adapter-exports.json ci-batch-schema-migration-drill.json; do
            if [ -f "${file}" ]; then
              cp "${file}" "${bundle_dir}/"
            fi
          done
          if [ -d ./.ci/batch-nightly-corpus ]; then
            rm -rf "${bundle_dir}/corpus"
            cp -R ./.ci/batch-nightly-corpus "${bundle_dir}/corpus"
          fi
          generated_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          incident_route_configured=false
          if [ -n "${ROOTCELLAR_INCIDENT_WEBHOOK_URL}" ]; then
            incident_route_configured=true
          fi
          dashboard_route_configured=false
          if [ -n "${ROOTCELLAR_DASHBOARD_INGEST_URL}" ]; then
            dashboard_route_configured=true
          fi
          incident_auth_configured=false
          if [ -n "${ROOTCELLAR_INCIDENT_WEBHOOK_TOKEN}" ]; then
            incident_auth_configured=true
          fi
          dashboard_auth_configured=false
          if [ -n "${ROOTCELLAR_DASHBOARD_INGEST_TOKEN}" ]; then
            dashboard_auth_configured=true
          fi
          alert_signing_configured=false
          if [ -n "${ROOTCELLAR_ALERT_SIGNING_SECRET}" ]; then
            alert_signing_configured=true
          fi
          ack_retention_index_generated=false
          if [ -f "./ci-batch-ack-retention-index.json" ]; then
            ack_retention_index_generated=true
          fi
          dashboard_pack_generated=false
          if [ -f "./ci-batch-dashboard-pack.json" ]; then
            dashboard_pack_generated=true
          fi
          alert_policy_generated=false
          if [ -f "./ci-batch-alert-policy.json" ]; then
            alert_policy_generated=true
          fi
          policy_escalation_generated=false
          if [ -f "./ci-batch-policy-escalation.json" ]; then
            policy_escalation_generated=true
          fi
          dashboard_adapter_exports_generated=false
          if [ -f "./ci-batch-dashboard-adapter-exports.json" ]; then
            dashboard_adapter_exports_generated=true
          fi
          schema_migration_drill_report_generated=false
          if [ -f "./ci-batch-schema-migration-drill.json" ]; then
            schema_migration_drill_report_generated=true
          fi
          benchmark_report_generated=false
          if [ -f "./ci-batch-bench-recalc-synthetic.json" ]; then
            benchmark_report_generated=true
          fi
          benchmark_events_generated=false
          if [ -f "./ci-batch-bench-events.jsonl" ]; then
            benchmark_events_generated=true
          fi
          cat > "${bundle_dir}/manifest.json" <<EOF
          {
            "workflow": "batch-recalc-nightly",
            "generated_at": "${generated_at}",
            "repository": "${GITHUB_REPOSITORY}",
